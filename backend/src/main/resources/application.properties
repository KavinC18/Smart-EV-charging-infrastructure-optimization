# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/chargeflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings
chargeflow.jwt.secret=9a62aa5f3c64e8e19e0b82f1bc2d89a6bc8b3d8753a8123abc456def78901234
# 24 Hours in milliseconds
chargeflow.jwt.expiration-ms=86400000

# Logging Level
logging.level.com.chargeflow=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

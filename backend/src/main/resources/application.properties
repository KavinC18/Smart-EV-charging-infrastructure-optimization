# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/chargeflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Settings
chargeflow.jwt.secret=${JWT_SECRET:9a62aa5f3c64e8e19e0b82f1bc2d89a6bc8b3d8753a8123abc456def78901234}
chargeflow.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
chargeflow.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://kavinc18.github.io}

# Logging Level
logging.level.com.chargeflow=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
